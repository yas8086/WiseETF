name: WiseETF每日轮动分析

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行每日分析
      run: |
        python daily_runner.py

    - name: 列出生成的报告文件
      run: |
        ls -la reports/

    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./reports
        publish_branch: gh-pages
        force_orphan: true
        commit_message: "每日ETF轮动报告 ${{ github.event.repository.updated_at }}"
